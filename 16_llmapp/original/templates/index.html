{% extends 'base.html' %}

{% block content %}
<form method="POST" action="/" id="chat-form">
    <div class="character-box">
        <label for="character-input">キャラクター名：</label>
        <input
            type="text"
            name="character"
            id="character-input"
            value="{{ character|e }}"
            placeholder="例：ドラえもん"
            autocomplete="off"
        >
    </div>

    <div class="chat-box" id="chat-box">
        {% if messages|length == 0 %}
        <div class="empty-message">
            {% if character %}
                「{{ character }}」になりきる準備ができました。メッセージを入力してください。
            {% else %}
                キャラクター名を入力してから会話を始めましょう。
            {% endif %}
        </div>
        {% endif %}
        {% for message in messages %}
        <div class="{{ message.class }}">
            {{ message.text|safe }}
        </div>
        {% endfor %}
    </div>

    <div class="input-box">
        <textarea
            name="user_message"
            id="user-input"
            placeholder="メッセージを入力..."
        ></textarea>
        <button type="submit" id="submit-button">送信</button>
    </div>
</form>

<form method="POST" action="/clear">
    <button type="submit" class="clear-button">履歴を消去</button>
</form>

<script src="{{ url_for('static', filename='main.js') }}"></script>
{% endblock %}
